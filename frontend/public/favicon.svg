<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>

  <!-- F1 wheel silhouette — flat-bottomed (unlike a road-car wheel), the single
       most distinctive giveaway of an actual F1 steering wheel at a glance. -->
  <path d="M 15.7 39 A 16.3 16.3 0 1 1 48.3 39 Z" fill="#f2f2f2"/>

  <!-- Paddle-shift tabs peeking out top-left / top-right -->
  <rect x="10.5" y="20" width="6" height="9" rx="2.5" fill="#f2f2f2"/>
  <rect x="47.5" y="20" width="6" height="9" rx="2.5" fill="#f2f2f2"/>

  <!-- Center console (screen + button cluster) -->
  <circle cx="32" cy="27" r="9.5" fill="#0a0a0a"/>
  <rect x="27.5" y="23.5" width="9" height="5" rx="1.2" fill="#47bfff"/>
  <circle cx="25" cy="32" r="2" fill="#e10600"/>
  <circle cx="39" cy="32" r="2" fill="#e10600"/>
</svg>
