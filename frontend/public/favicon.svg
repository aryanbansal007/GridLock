<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- A starting grid, rendered as a 2x3 box grid — the literal F1 "grid" — with
       one position locked in red, reading as both GRID and LOCK at once. -->
  <rect x="14" y="12" width="14" height="11" rx="2.5" fill="#f5f5f5"/>
  <rect x="36" y="12" width="14" height="11" rx="2.5" fill="#f5f5f5" opacity="0.55"/>
  <rect x="14" y="26.5" width="14" height="11" rx="2.5" fill="#f5f5f5" opacity="0.55"/>
  <rect x="36" y="26.5" width="14" height="11" rx="2.5" fill="#e10600"/>
  <rect x="14" y="41" width="14" height="11" rx="2.5" fill="#f5f5f5" opacity="0.55"/>
  <rect x="36" y="41" width="14" height="11" rx="2.5" fill="#f5f5f5" opacity="0.55"/>
</svg>
